<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Strategy Dashboard | Work Winning Thesis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .edit-input { outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
    .edit-input:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 1); }
    path { transition: fill 0.3s ease, d 0.7s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, memo, useRef } = React;

    // --- Configuration & Constants ---
    const STORAGE_KEY = 'business_strategy_data';
    const THEME = {
      card: "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm",
      input: "bg-black/5 edit-input rounded px-2 py-1 transition-all",
      btnPrimary: "flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm",
      btnSecondary: "flex items-center gap-2 px-4 py-2 rounded-lg font-semibold border border-slate-200 hover:bg-slate-50 transition-all text-sm",
      tag: "text-[10px] font-bold uppercase tracking-wider",
      nodes: [
        { id: 'emerald', label: 'Emerald', classes: 'bg-emerald-50 text-emerald-900 border-emerald-200' },
        { id: 'blue', label: 'Blue', classes: 'bg-blue-50 text-blue-900 border-blue-200' },
        { id: 'slate', label: 'Slate (Lt)', classes: 'bg-slate-100 text-slate-800 border-slate-300' },
        { id: 'slate-mid', label: 'Slate (Md)', classes: 'bg-slate-500 text-white border-slate-600' },
        { id: 'slate-dark', label: 'Slate (Dk)', classes: 'bg-slate-800 text-white border-slate-900' },
        { id: 'black', label: 'Black', classes: 'bg-black text-white border-gray-800' }
      ]
    };

    const INITIAL_DATA = {
      utilisationTarget: 75,
      titles: { sales: "Sales Channels & Intake", tiers: "Client Tier Architecture", sankey: "The 'Land & Expand' Journey" },
      waysToWin: {
        competitive: ["Projects through Frameworks", "Projects competitively tendered"],
        nonCompetitive: ["Direct sourcing extensions", "Follow up projects", "Variations", "New work through personal relationships"]
      },
      tiers: [
        { id: 'u', name: 'Upper Finish Tier', weight: 10, attributes: 'Small projects, new clients.', management: 'Director sourced.', bgColor: 'bg-slate-200', textColor: 'text-slate-900', borderColor: 'border-slate-300' },
        { id: 'm', name: 'Mid Structure Tier', weight: 15, attributes: 'Frameworks, competitive bids.', management: 'Senior/Exec managed.', bgColor: 'bg-slate-500', textColor: 'text-white', borderColor: 'border-slate-600' },
        { id: 'b', name: 'Base / Foundation Tier', weight: 50, attributes: 'Core clients, long engagements.', management: 'Senior/Exec managed.', bgColor: 'bg-black', textColor: 'text-white', borderColor: 'border-slate-900' }
      ],
      sankeyNodes: [
        { id: 'n1', title: 'Director Led / Networks', year: 1, themeId: 'emerald' },
        { id: 'n2', title: 'Formal Frameworks', year: 1, themeId: 'blue' },
        { id: 'n3', title: 'Upper Finish Tier', year: 2, themeId: 'slate' },
        { id: 'n4', title: 'Mid Structure Tier', year: 2, themeId: 'slate-mid' },
        { id: 'n5', title: 'Mid Structure (Retained)', year: 3, themeId: 'slate-dark' },
        { id: 'n6', title: 'Base / Foundation Tier', year: 3, themeId: 'black' }
      ],
      sankeyFlows: [
        { id: 'f1', source: 'n1', target: 'n3', volume: 15 }, { id: 'f2', source: 'n2', target: 'n4', volume: 25 },
        { id: 'f3', source: 'n3', target: 'n4', volume: 5 }, { id: 'f4', source: 'n3', target: 'n6', volume: 10 },
        { id: 'f5', source: 'n4', target: 'n5', volume: 10 }, { id: 'f6', source: 'n4', target: 'n6', volume: 15 }
      ]
    };

    // --- Hooks & Utilities ---
    const useDashboardData = () => {
      const [data, setData] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA);
      useEffect(() => localStorage.setItem(STORAGE_KEY, JSON.stringify(data)), [data]);

      const patch = (path, value) => {
        const keys = path.split('.');
        setData(prev => {
          const next = { ...prev };
          let curr = next;
          keys.forEach((k, i) => {
            if (i === keys.length - 1) curr[k] = value;
            else curr = curr[k] = { ...curr[k] };
          });
          return next;
        });
      };

      const updateList = (key, idx, val, action) => {
        const list = [...data[key]];
        if (action === 'upd') list[idx] = { ...list[idx], ...val };
        else if (action === 'add') list.push(val);
        else if (action === 'del') list.splice(idx, 1);
        patch(key, list);
      };

      return { data, setData, patch, updateList };
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);
    
    const calculateSankeyLayout = (data) => {
      const { sankeyNodes: nodes, sankeyFlows: flows } = data;
      const inVol = {}, outVol = {};
      flows.forEach(f => { (outVol[f.source] = (outVol[f.source] || 0) + f.volume); (inVol[f.target] = (inVol[f.target] || 0) + f.volume); });

      const cols = { 1: [], 2: [], 3: [] };
      nodes.forEach(n => cols[n.year]?.push({ ...n, vol: Math.max(inVol[n.id] || 0, outVol[n.id] || 0), in: inVol[n.id] || 0, out: outVol[n.id] || 0 }));

      const minH = 50, gapY = 30, top = 60, bot = 40, w = 180, gapX = 180;
      const totalH = Math.max(...[1,2,3].map(y => top + cols[y].reduce((s, n) => s + Math.max(n.vol * 10, minH), 0) + (cols[y].length * gapY) + bot), 540);
      const scale = (totalH - top - bot - (Math.max(...[1,2,3].map(y => cols[y].length)) * gapY)) / Math.max(...[1,2,3].map(y => cols[y].reduce((s, n) => s + n.vol, 0)), 1);
      
      const placed = {};
      [1,2,3].forEach(y => {
        let curY = top;
        cols[y].forEach(n => {
          const h = Math.max(n.vol * scale, minH);
          placed[n.id] = { ...n, theme: THEME.nodes.find(t => t.id === n.themeId)?.classes || THEME.nodes[2].classes, x: 20 + (y-1) * (w + gapX), y: curY, w, h, outY: curY + (h - (n.out * scale)) / 2, inY: curY + (h - (n.in * scale)) / 2 };
          curY += h + gapY;
        });
      });

      const paths = flows.map(f => {
        const s = placed[f.source], t = placed[f.target];
        if (!s || !t) return null;
        const thick = Math.max(f.volume * scale, 2);
        const color = s.theme.split(' ')[0].replace('bg-', '').split('-')[0];
        const p = { id: f.id, val: f.volume, c: `fill-${color === 'black' ? 'gray' : color}-500/30 hover:fill-${color === 'black' ? 'gray' : color}-500/50`, x0: s.x + s.w, y0: s.outY, x1: t.x, y1: t.inY, thick };
        s.outY += thick; t.inY += thick; return p;
      }).filter(Boolean);

      return { nodes: Object.values(placed), paths, totalH, headers: [1,2,3].map(y => ({ title: `Year ${y}: ${['Intake', 'Landing', 'Expansion'][y-1]}`, x: 20 + (y-1)*(w+gapX) + w/2 })) };
    };

    // --- Sub-components ---
    const Icon = memo(({ name, className }) => {
      const paths = {
        Pencil: <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        CheckCircle2: <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>,
        Layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></>,
        TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
        Briefcase: <><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        Network: <><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></>,
        Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>
      };
      return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{paths[name]}</svg>;
    });

    const EditableText = memo(({ value, onChange, className, isEditing, multiline, type = "text", ...props }) => {
      if (!isEditing) return <span className={className}>{value}</span>;
      const Tag = multiline ? 'textarea' : 'input';
      return <Tag {...props} type={type} value={value} onChange={e => onChange(e.target.value)} rows={3} className={`${THEME.input} ${className} ${!multiline && type === 'number' ? 'w-24' : 'w-full'}`} />;
    });

    const Section = ({ icon, title, isEditing, onTitleChange, children, className }) => (
      <section className={`${THEME.card} ${className}`}>
        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
          <Icon name={icon} className="w-5 h-5 text-slate-400 shrink-0" />
          <h2 className="text-lg font-bold text-slate-800 w-full"><EditableText value={title} isEditing={isEditing} onChange={onTitleChange} /></h2>
        </div>
        {children}
      </section>
    );

    // --- Main Dashboard ---
    function BusinessStrategyDashboard() {
      const { data, setData, patch, updateList } = useDashboardData();
      const [isEditing, setIsEditing] = useState(false);
      const fileRef = useRef();
      const layout = useMemo(() => calculateSankeyLayout(data), [data.sankeyNodes, data.sankeyFlows]);

      const handleExport = () => {
        const url = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
        const a = document.createElement('a'); a.href = url; a.download = 'strategy-config.json'; a.click(); URL.revokeObjectURL(url);
      };

      const handleImport = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { try { setData(JSON.parse(ev.target.result)); } catch { alert('Invalid file'); } };
        if (e.target.files[0]) reader.readAsText(e.target.files[0]);
      };

      return (
        <div className="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
          {/* Header */}
          <header className={`${THEME.card} flex flex-col md:flex-row justify-between items-center gap-6`}>
            <div className="flex items-center gap-4">
              <div className="p-3 bg-slate-800 rounded-lg shrink-0"><Icon name="Layers" className="w-6 h-6 text-white" /></div>
              <div><h1 className="text-2xl font-bold">Market Architecture</h1><p className="text-slate-500 font-medium">Strategic Modelling</p></div>
            </div>
            <div className="flex flex-wrap items-center gap-4 w-full md:w-auto justify-end">
              <div className="flex gap-2">
                <button onClick={handleExport} className={THEME.btnSecondary}><Icon name="Download" className="w-4 h-4" /> Export</button>
                <button onClick={() => fileRef.current?.click()} className={THEME.btnSecondary}><Icon name="Upload" className="w-4 h-4" /> Import</button>
                <input type="file" ref={fileRef} onChange={handleImport} accept=".json" className="hidden" />
              </div>
              <div className="bg-blue-50 border border-blue-100 px-4 py-2 rounded-xl flex items-center gap-3">
                <Icon name="Target" className="w-4 h-4 text-blue-600" />
                <div className="flex flex-col"><span className={THEME.tag + " text-blue-800"}>Utilisation</span>
                  <div className="text-lg font-bold text-blue-900 leading-tight">
                    <EditableText value={data.utilisationTarget} isEditing={isEditing} type="number" min={0} max={100} onChange={v => patch('utilisationTarget', Math.min(100, Math.max(0, Number(v))))} />%
                  </div>
                </div>
              </div>
              <button onClick={() => setIsEditing(!isEditing)} className={`${THEME.btnPrimary} ${isEditing ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-white'}`}>
                <Icon name={isEditing ? "Save" : "Pencil"} className="w-4 h-4" />{isEditing ? 'Save' : 'Edit'}
              </button>
            </div>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            {/* Ways to Win */}
            <Section icon="Briefcase" title={data.titles.sales} isEditing={isEditing} onTitleChange={v => patch('titles.sales', v)} className="lg:col-span-5">
              {['competitive', 'nonCompetitive'].map(cat => (
                <div key={cat} className="mb-8 last:mb-0">
                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-4 flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${cat === 'competitive' ? 'bg-blue-500' : 'bg-emerald-500'}`}></span>{cat.replace(/([A-Z])/g, ' $1')}
                  </h3>
                  <ul className="space-y-3">{data.waysToWin[cat].map((item, i) => (
                    <li key={i} className="flex items-start gap-3 group">
                      <Icon name="CheckCircle2" className="w-5 h-5 text-slate-300 mt-0.5" />
                      <EditableText value={item} isEditing={isEditing} onChange={v => { const list = [...data.waysToWin[cat]]; list[i] = v; patch(`waysToWin.${cat}`, list); }} className="text-slate-700 font-medium" />
                      {isEditing && <button onClick={() => { const list = [...data.waysToWin[cat]]; list.splice(i, 1); patch(`waysToWin.${cat}`, list); }} className="text-red-400 opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="w-4 h-4" /></button>}
                    </li>
                  ))}</ul>
                  {isEditing && <button onClick={() => patch(`waysToWin.${cat}`, [...data.waysToWin[cat], "New Item"])} className={`mt-4 flex items-center gap-2 text-sm font-semibold text-${cat === 'competitive' ? 'blue' : 'emerald'}-600`}><Icon name="Plus" className="w-4 h-4" /> Add</button>}
                </div>
              ))}
            </Section>

            {/* Tiers Stack */}
            <Section icon="Network" title={data.titles.tiers} isEditing={isEditing} onTitleChange={v => patch('titles.tiers', v)} className="lg:col-span-7 flex flex-col">
              <div className="flex flex-col flex-grow rounded-xl overflow-hidden border border-slate-200">
                {data.tiers.map((t, i) => (
                  <div key={t.id} style={{ flexGrow: t.weight }} className={`${t.bgColor} ${t.textColor} border-b last:border-b-0 ${t.borderColor} p-6 relative group flex flex-col justify-center`}>
                    {isEditing && <button onClick={() => updateList('tiers', i, null, 'del')} className="absolute top-4 right-4 text-white/50 hover:text-red-400 opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="w-4 h-4" /></button>}
                    <div className="relative z-10 flex flex-col md:flex-row gap-6">
                      <div className="md:w-1/3"><h3 className="text-xl font-bold"><EditableText value={t.name} isEditing={isEditing} onChange={v => updateList('tiers', i, { name: v }, 'upd')} /></h3>
                        <div className="text-2xl font-bold opacity-90"><EditableText value={t.weight} isEditing={isEditing} type="number" onChange={v => updateList('tiers', i, { weight: Number(v) }, 'upd')} />%</div>
                      </div>
                      <div className="md:w-2/3 space-y-3">{['attributes', 'management'].map(f => (
                        <div key={f} className="text-sm opacity-90"><strong className={THEME.tag + " opacity-70 block mb-1"}>{f}</strong>
                          <EditableText value={t[f]} isEditing={isEditing} multiline onChange={v => updateList('tiers', i, { [f]: v }, 'upd')} />
                        </div>
                      ))}</div>
                    </div>
                  </div>
                ))}
              </div>
              {isEditing && <button onClick={() => updateList('tiers', 0, { id: generateId(), name: 'New Tier', weight: 10, bgColor: 'bg-slate-200', textColor: 'text-slate-900', borderColor: 'border-slate-300' }, 'add')} className="mt-4 w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-semibold text-slate-500"><Icon name="Plus" className="w-4 h-4 inline mr-2" />Add Tier</button>}
            </Section>
          </div>

          {/* Sankey Chart */}
          <Section icon="TrendingUp" title={data.titles.sankey} isEditing={isEditing} onTitleChange={v => patch('titles.sankey', v)}>
            <div className="overflow-x-auto bg-slate-50/50 rounded-xl border border-slate-100 p-4">
              <svg viewBox={`0 0 1080 ${layout.totalH}`} style={{ height: `${layout.totalH}px` }} className="w-full min-w-[900px]">
                {layout.headers.map((h, i) => <text key={i} x={h.x} y={30} textAnchor="middle" className="fill-slate-400 font-bold text-sm tracking-widest uppercase">{h.title}</text>)}
                {layout.paths.map(p => <path key={p.id} d={`M ${p.x0} ${p.y0} C ${p.x0 + (p.x1-p.x0)*0.45} ${p.y0}, ${p.x1 - (p.x1-p.x0)*0.45} ${p.y1}, ${p.x1} ${p.y1} L ${p.x1} ${p.y1+p.thick} C ${p.x1 - (p.x1-p.x0)*0.45} ${p.y1+p.thick}, ${p.x0 + (p.x1-p.x0)*0.45} ${p.y0+p.thick}, ${p.x0} ${p.y0+p.thick} Z`} className={p.c}><title>Vol: {p.val}</title></path>)}
                {layout.nodes.map(n => (
                  <foreignObject key={n.id} x={n.x} y={n.y} width={n.w} height={n.h}>
                    <div className={`w-full h-full flex items-center justify-center p-3 text-center border-2 rounded-md drop-shadow-sm pointer-events-none ${n.theme}`}>
                      <span className="font-semibold text-[13px] leading-tight">{n.title}</span>
                    </div>
                  </foreignObject>
                ))}
              </svg>
            </div>
            {isEditing && <div className="mt-8 space-y-6">
              {[ { t: 'Blocks', k: 'sankeyNodes', f: ['title', 'year', 'themeId'] }, { t: 'Flows', k: 'sankeyFlows', f: ['source', 'target', 'volume'] } ].map(cfg => (
                <div key={cfg.t} className="border border-slate-200 rounded-xl overflow-hidden">
                  <div className="bg-slate-100 px-4 py-3 font-bold text-sm text-slate-700">{cfg.t}</div>
                  <div className="overflow-x-auto"><table className="w-full text-left text-sm">
                    <thead className="bg-slate-50 text-slate-500 border-b border-slate-100 text-[10px] uppercase tracking-wider"><tr>{cfg.f.map(f => <th key={f} className="px-4 py-3">{f}</th>)}<th className="w-12"></th></tr></thead>
                    <tbody className="divide-y divide-slate-100">{data[cfg.k].map((row, i) => (
                      <tr key={row.id} className="hover:bg-slate-50/50">{cfg.f.map(f => (
                        <td key={f} className="px-4 py-2">
                          {f === 'themeId' ? <select value={row[f]} onChange={e => updateList(cfg.k, i, { [f]: e.target.value }, 'upd')} className="w-full bg-transparent outline-none">{THEME.nodes.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select>
                          : f === 'year' ? <select value={row[f]} onChange={e => updateList(cfg.k, i, { [f]: parseInt(e.target.value) }, 'upd')} className="w-full bg-transparent outline-none"><option value={1}>Yr 1</option><option value={2}>Yr 2</option><option value={3}>Yr 3</option></select>
                          : f === 'source' || f === 'target' ? <select value={row[f]} onChange={e => updateList(cfg.k, i, { [f]: e.target.value }, 'upd')} className="w-full bg-transparent outline-none">{data.sankeyNodes.map(n => <option key={n.id} value={n.id}>{n.title}</option>)}</select>
                          : <input type={f === 'volume' ? 'number' : 'text'} value={row[f]} onChange={e => updateList(cfg.k, i, { [f]: f === 'volume' ? Number(e.target.value) : e.target.value }, 'upd')} className="w-full bg-transparent outline-none" />}
                        </td>
                      ))}<td className="px-4 py-2 text-right"><button onClick={() => updateList(cfg.k, i, null, 'del')} className="text-slate-400 hover:text-red-500"><Icon name="Trash2" className="w-4 h-4" /></button></td></tr>
                    ))}</tbody>
                  </table></div>
                  <button onClick={() => updateList(cfg.k, 0, cfg.k === 'sankeyNodes' ? { id: generateId(), title: 'New', year: 1, themeId: 'slate' } : { id: generateId(), source: data.sankeyNodes[0]?.id, target: data.sankeyNodes[0]?.id, volume: 10 }, 'add')} className="p-3 text-xs font-bold text-blue-600"><Icon name="Plus" className="w-3 h-3 inline mr-1" />Add {cfg.t.slice(0,-1)}</button>
                </div>
              ))}
            </div>}
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BusinessStrategyDashboard />);
  </script>
</body>
</html>

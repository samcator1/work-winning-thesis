<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Strategy Dashboard | Work Winning Thesis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .edit-input { outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
    .edit-input:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 1); }
    path { transition: fill 0.3s ease, d 0.7s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, memo } = React;

    // --- Configuration & Themes ---
    const STORAGE_KEY = 'business_strategy_data';
    const UI_CLASSES = {
      card: "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm",
      sectionHeader: "flex items-center gap-3 mb-6 pb-4 border-b border-slate-100",
      buttonPrimary: "flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm shrink-0",
      tableHeader: "bg-slate-50 text-slate-500 border-b border-slate-100 text-xs uppercase tracking-wider",
      iconBox: "p-3 bg-slate-800 rounded-lg shadow-inner shrink-0"
    };

    const NODE_THEMES = [
      { id: 'emerald', label: 'Emerald (Light)', classes: 'bg-emerald-50 text-emerald-900 border-emerald-200' },
      { id: 'blue', label: 'Blue (Light)', classes: 'bg-blue-50 text-blue-900 border-blue-200' },
      { id: 'slate', label: 'Slate (Light)', classes: 'bg-slate-100 text-slate-800 border-slate-300' },
      { id: 'slate-mid', label: 'Slate (Mid)', classes: 'bg-slate-500 text-white border-slate-600' },
      { id: 'slate-dark', label: 'Slate (Dark)', classes: 'bg-slate-800 text-white border-slate-900' },
      { id: 'black', label: 'Black (Dark)', classes: 'bg-black text-white border-gray-800' } 
    ];

    const INITIAL_DATA = {
      utilisationTarget: 75,
      titles: { sales: "Sales Channels & Intake", tiers: "Client Tier Architecture", sankey: "The 'Land & Expand' Journey" },
      waysToWin: {
        competitive: ["Projects through Frameworks", "Projects competitively tendered"],
        nonCompetitive: ["Direct sourcing extensions: same work", "Follow up projects", "Variations", "New work through personal relationships"]
      },
      tiers: [
        { id: 'upper', name: 'Upper Finish Tier', weight: 10, attributes: 'Small projects, new clients, direct sourced.', management: 'Director sourced.', bgColor: 'bg-slate-200', textColor: 'text-slate-900', borderColor: 'border-slate-300' },
        { id: 'mid', name: 'Mid Structure Tier', weight: 15, attributes: 'Frameworks, competitive bids.', management: 'Senior/Exec managed.', bgColor: 'bg-slate-500', textColor: 'text-white', borderColor: 'border-slate-600' },
        { id: 'base', name: 'Base / Foundation Tier', weight: 50, attributes: 'Core clients, long engagements.', management: 'Senior/Exec managed.', bgColor: 'bg-black', textColor: 'text-white', borderColor: 'border-slate-900' }
      ],
      sankeyNodes: [
        { id: 'n1', title: 'Director Led / Networks', year: 1, themeId: 'emerald' },
        { id: 'n2', title: 'Formal Frameworks', year: 1, themeId: 'blue' },
        { id: 'n3', title: 'Upper Finish Tier', year: 2, themeId: 'slate' },
        { id: 'n4', title: 'Mid Structure Tier', year: 2, themeId: 'slate-mid' },
        { id: 'n5', title: 'Mid Structure (Retained)', year: 3, themeId: 'slate-dark' },
        { id: 'n6', title: 'Base / Foundation Tier', year: 3, themeId: 'black' }
      ],
      sankeyFlows: [
        { id: 'f1', source: 'n1', target: 'n3', volume: 15 }, { id: 'f2', source: 'n2', target: 'n4', volume: 25 },
        { id: 'f3', source: 'n3', target: 'n4', volume: 5 }, { id: 'f4', source: 'n3', target: 'n6', volume: 10 },
        { id: 'f5', source: 'n4', target: 'n5', volume: 10 }, { id: 'f6', source: 'n4', target: 'n6', volume: 15 }
      ]
    };

    // --- Utilities ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    
    const calculateSankeyLayout = (data) => {
      const { sankeyNodes: nodes, sankeyFlows: flows } = data;
      const inVol = {}, outVol = {};
      flows.forEach(f => {
        outVol[f.source] = (outVol[f.source] || 0) + f.volume;
        inVol[f.target] = (inVol[f.target] || 0) + f.volume;
      });

      const cols = { 1: [], 2: [], 3: [] };
      nodes.forEach(n => {
        const vol = Math.max(inVol[n.id] || 0, outVol[n.id] || 0);
        cols[n.year]?.push({ ...n, vol, inVol: inVol[n.id] || 0, outVol: outVol[n.id] || 0 });
      });

      const maxColVol = Math.max(...[1, 2, 3].map(y => cols[y].reduce((sum, n) => sum + n.vol, 0)), 10);
      const scale = 400 / maxColVol, minH = 50, w = 180, gapX = 180, gapY = 30;
      const colX = { 1: 20, 2: 20 + w + gapX, 3: 20 + (w + gapX) * 2 };
      
      const placedNodes = {};
      [1, 2, 3].forEach(y => {
        let currentY = 60;
        cols[y].forEach(n => {
          const h = Math.max(n.vol * scale, minH);
          const theme = NODE_THEMES.find(t => t.id === n.themeId) || NODE_THEMES[2];
          placedNodes[n.id] = { ...n, themeClasses: theme.classes, x: colX[y], y: currentY, w, h,
            currentOutY: currentY + (h - (n.outVol * scale)) / 2,
            currentInY: currentY + (h - (n.inVol * scale)) / 2
          };
          currentY += h + gapY;
        });
      });

      const paths = [...flows].sort((a, b) => (placedNodes[a.source]?.y || 0) - (placedNodes[b.source]?.y || 0)).map(f => {
        const s = placedNodes[f.source], t = placedNodes[f.target];
        if (!s || !t) return null;
        const thick = f.volume * scale;
        const colorName = s.themeClasses.split(' ')[0].replace('bg-', '').split('-')[0];
        const path = { id: f.id, val: f.volume, color: `fill-${colorName === 'black' ? 'gray' : colorName}-500/30 hover:fill-${colorName === 'black' ? 'gray' : colorName}-500/50`,
          x0: s.x + s.w, y0_t: s.currentOutY, y0_b: s.currentOutY + thick,
          x1: t.x,       y1_t: t.currentInY,  y1_b: t.currentInY + thick
        };
        s.currentOutY += thick; t.currentInY += thick;
        return path;
      }).filter(Boolean);

      return { nodes: Object.values(placedNodes), paths, headers: [1,2,3].map(y => ({ title: `Year ${y}: ${['Intake', 'Landing', 'Expansion'][y-1]}`, x: colX[y] + w/2 })) };
    };

    // --- Core Sub-components ---
    const Icon = memo(({ name, className }) => {
      const paths = {
        Pencil: <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
        Layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></>,
        TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
        Briefcase: <><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        Network: <><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></>,
        Link2: <><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></>
      };
      return <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{paths[name]}</svg>;
    });

    const EditableText = memo(({ value, onChange, className, isEditing, multiline, type = "text", min, max }) => {
      if (!isEditing) return <span className={className}>{value}</span>;
      const Tag = multiline ? 'textarea' : 'input';
      return <Tag type={type} value={value} onChange={e => onChange(e.target.value)} min={min} max={max} rows={3} className={`bg-black/5 edit-input rounded px-2 py-1 transition-all ${className} ${!multiline && type === 'number' ? 'w-24' : 'w-full'}`} />;
    });

    // --- Section Components ---
    const SectionHeader = ({ icon, title, isEditing, onTitleChange }) => (
      <div className={UI_CLASSES.sectionHeader}>
        <Icon name={icon} className="w-5 h-5 text-slate-400 shrink-0" />
        <h2 className="text-lg font-bold text-slate-800 w-full"><EditableText value={title} isEditing={isEditing} onChange={onTitleChange} /></h2>
      </div>
    );

    function BusinessStrategyDashboard() {
      const [isEditing, setIsEditing] = useState(false);
      const [data, setData] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA);
      useEffect(() => localStorage.setItem(STORAGE_KEY, JSON.stringify(data)), [data]);

      const layout = useMemo(() => calculateSankeyLayout(data), [data.sankeyNodes, data.sankeyFlows]);

      const update = (path, value) => {
        const keys = path.split('.');
        setData(prev => {
          const next = { ...prev };
          let curr = next;
          for (let i = 0; i < keys.length - 1; i++) curr = curr[keys[i]] = { ...curr[keys[i]] };
          curr[keys[keys.length - 1]] = value;
          return next;
        });
      };

      const handleWayToWin = (cat, idx, val, action) => {
        const list = [...data.waysToWin[cat]];
        if (action === 'upd') list[idx] = val;
        else if (action === 'add') list.push("New Item");
        else if (action === 'del') list.splice(idx, 1);
        update(`waysToWin.${cat}`, list);
      };

      return (
        <div className="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
          <header className={`${UI_CLASSES.card} flex flex-col md:flex-row justify-between items-center gap-6`}>
            <div className="flex items-center gap-4">
              <div className={UI_CLASSES.iconBox}><Icon name="Layers" className="w-6 h-6 text-white" /></div>
              <div><h1 className="text-2xl font-bold tracking-tight">Market Architecture</h1><p className="text-slate-500 font-medium">Strategic Modelling Dashboard</p></div>
            </div>
            <div className="flex items-center gap-6 w-full md:w-auto">
              <div className="bg-blue-50 border border-blue-100 px-5 py-3 rounded-xl flex items-center gap-3">
                <Icon name="Target" className="w-5 h-5 text-blue-600" />
                <div className="flex flex-col"><span className="text-xs font-bold text-blue-800 uppercase">Utilisation</span>
                  <div className="text-xl font-bold text-blue-900"><EditableText value={data.utilisationTarget} isEditing={isEditing} type="number" min={0} max={100} onChange={v => update('utilisationTarget', Math.min(100, Math.max(0, Number(v))))} />%</div>
                </div>
              </div>
              <button onClick={() => setIsEditing(!isEditing)} className={`${UI_CLASSES.buttonPrimary} ${isEditing ? 'bg-emerald-500 hover:bg-emerald-600 text-white' : 'bg-slate-800 hover:bg-slate-700 text-white'}`}>
                <Icon name={isEditing ? "Save" : "Pencil"} className="w-4 h-4" />{isEditing ? 'Save' : 'Edit'}
              </button>
            </div>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <section className="lg:col-span-5 h-full"><div className={UI_CLASSES.card}>
              <SectionHeader icon="Briefcase" title={data.titles.sales} isEditing={isEditing} onTitleChange={v => update('titles.sales', v)} />
              {['competitive', 'nonCompetitive'].map(cat => (
                <div key={cat} className="mb-8 last:mb-0">
                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-4 flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${cat === 'competitive' ? 'bg-blue-500' : 'bg-emerald-500'}`}></span>{cat.replace(/([A-Z])/g, ' $1')}</h3>
                  <ul className="space-y-3">{data.waysToWin[cat].map((item, i) => (
                    <li key={i} className="flex items-start gap-3 group">
                      <Icon name="CheckCircle2" className="w-5 h-5 text-slate-300 shrink-0 mt-0.5" />
                      <EditableText value={item} isEditing={isEditing} onChange={v => handleWayToWin(cat, i, v, 'upd')} className="text-slate-700 font-medium" />
                      {isEditing && <button onClick={() => handleWayToWin(cat, i, null, 'del')} className="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2" className="w-4 h-4" /></button>}
                    </li>
                  ))}</ul>
                  {isEditing && <button onClick={() => handleWayToWin(cat, null, null, 'add')} className={`mt-4 flex items-center gap-2 text-sm font-semibold text-${cat === 'competitive' ? 'blue' : 'emerald'}-600`}><Icon name="Plus" className="w-4 h-4" /> Add</button>}
                </div>
              ))}
            </div></section>

            <section className="lg:col-span-7 h-full flex flex-col"><div className={UI_CLASSES.card + " flex-grow flex flex-col"}>
              <SectionHeader icon="Network" title={data.titles.tiers} isEditing={isEditing} onTitleChange={v => update('titles.tiers', v)} />
              <div className="flex flex-col flex-grow rounded-xl overflow-hidden border border-slate-200">
                {data.tiers.map((t, idx) => (
                  <div key={t.id} style={{ flexGrow: t.weight }} className={`${t.bgColor} ${t.textColor} border-b last:border-b-0 ${t.borderColor} p-6 relative group flex flex-col justify-center`}>
                    {isEditing && <button onClick={() => update('tiers', data.tiers.filter((_, i) => i !== idx))} className="absolute top-4 right-4 text-white/50 hover:text-red-400 opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="w-4 h-4" /></button>}
                    <div className="relative z-10 flex flex-col md:flex-row gap-6">
                      <div className="md:w-1/3"><h3 className="text-xl font-bold"><EditableText value={t.name} isEditing={isEditing} onChange={v => { const n = [...data.tiers]; n[idx].name = v; update('tiers', n); }} /></h3>
                        <div className="text-2xl font-bold opacity-90"><EditableText value={t.weight} isEditing={isEditing} type="number" onChange={v => { const n = [...data.tiers]; n[idx].weight = Number(v); update('tiers', n); }} />%</div>
                      </div>
                      <div className="md:w-2/3 space-y-3">{['attributes', 'management'].map(field => (
                        <div key={field} className="text-sm opacity-90"><strong className="uppercase text-xs opacity-70 block mb-1">{field}</strong>
                          <EditableText value={t[field]} isEditing={isEditing} multiline onChange={v => { const n = [...data.tiers]; n[idx][field] = v; update('tiers', n); }} />
                        </div>
                      ))}</div>
                    </div>
                  </div>
                ))}
              </div>
              {isEditing && <button onClick={() => update('tiers', [...data.tiers, { id: generateId(), name: 'New Tier', weight: 10, bgColor: 'bg-slate-200', textColor: 'text-slate-900', borderColor: 'border-slate-300' }])} className="mt-4 w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-semibold text-slate-500"><Icon name="Plus" className="w-4 h-4 inline mr-2" />Add Tier</button>}
            </div></section>
          </div>

          <section className={UI_CLASSES.card}>
            <SectionHeader icon="TrendingUp" title={data.titles.sankey} isEditing={isEditing} onTitleChange={v => update('titles.sankey', v)} />
            <div className="overflow-x-auto bg-slate-50/50 rounded-xl border border-slate-100 p-4">
              <svg viewBox="0 0 1080 540" className="w-full h-auto min-w-[900px]">
                {layout.headers.map((h, i) => <text key={i} x={h.x} y={30} textAnchor="middle" className="fill-slate-400 font-bold text-sm tracking-widest uppercase">{h.title}</text>)}
                {layout.paths.map(p => <path key={p.id} d={`M ${p.x0} ${p.y0_t} C ${p.x0 + (p.x1-p.x0)*0.45} ${p.y0_t}, ${p.x1 - (p.x1-p.x0)*0.45} ${p.y1_t}, ${p.x1} ${p.y1_t} L ${p.x1} ${p.y1_b} C ${p.x1 - (p.x1-p.x0)*0.45} ${p.y1_b}, ${p.x0 + (p.x1-p.x0)*0.45} ${p.y0_b}, ${p.x0} ${p.y0_b} Z`} className={p.color}><title>Vol: {p.val}</title></path>)}
                {layout.nodes.map(n => (
                  <foreignObject key={n.id} x={n.x} y={n.y} width={n.w} height={n.h}>
                    <div className={`w-full h-full flex items-center justify-center p-3 text-center border-2 rounded-md drop-shadow-sm pointer-events-none ${n.themeClasses}`}>
                      <span className="font-semibold text-[13px] leading-tight">{n.title}</span>
                    </div>
                  </foreignObject>
                ))}
              </svg>
            </div>
            {isEditing && <div className="mt-8 space-y-6">
              {[ { t: 'Blocks', d: 'sankeyNodes', f: ['title', 'year', 'themeId'] }, { t: 'Flows', d: 'sankeyFlows', f: ['source', 'target', 'volume'] } ].map(cfg => (
                <div key={cfg.t} className="border border-slate-200 rounded-xl overflow-hidden">
                  <div className="bg-slate-100 px-4 py-3 font-bold text-sm text-slate-700">{cfg.t}</div>
                  <div className="overflow-x-auto"><table className="w-full text-left text-sm">
                    <thead className={UI_CLASSES.tableHeader}><tr>{cfg.f.map(f => <th key={f} className="px-4 py-3">{f}</th>)}<th className="w-12"></th></tr></thead>
                    <tbody className="divide-y divide-slate-100">{data[cfg.d].map((row, i) => (
                      <tr key={row.id} className="hover:bg-slate-50/50">{cfg.f.map(f => (
                        <td key={f} className="px-4 py-2">
                          {f === 'themeId' ? <select value={row[f]} onChange={e => { const n = [...data[cfg.d]]; n[i][f] = e.target.value; update(cfg.d, n); }} className="w-full bg-transparent outline-none">{NODE_THEMES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select>
                          : f === 'year' ? <select value={row[f]} onChange={e => { const n = [...data[cfg.d]]; n[i][f] = parseInt(e.target.value); update(cfg.d, n); }} className="w-full bg-transparent outline-none"><option value={1}>Yr 1</option><option value={2}>Yr 2</option><option value={3}>Yr 3</option></select>
                          : f === 'source' || f === 'target' ? <select value={row[f]} onChange={e => { const n = [...data[cfg.d]]; n[i][f] = e.target.value; update(cfg.d, n); }} className="w-full bg-transparent outline-none">{data.sankeyNodes.map(n => <option key={n.id} value={n.id}>{n.title}</option>)}</select>
                          : <input type={f === 'volume' ? 'number' : 'text'} value={row[f]} onChange={e => { const n = [...data[cfg.d]]; n[i][f] = f === 'volume' ? Number(e.target.value) : e.target.value; update(cfg.d, n); }} className="w-full bg-transparent outline-none" />}
                        </td>
                      ))}<td className="px-4 py-2"><button onClick={() => update(cfg.d, data[cfg.d].filter((_, idx) => idx !== i))} className="text-slate-400 hover:text-red-500"><Icon name="Trash2" className="w-4 h-4" /></button></td></tr>
                    ))}</tbody>
                  </table></div>
                  <button onClick={() => update(cfg.d, [...data[cfg.d], cfg.d === 'sankeyNodes' ? { id: generateId(), title: 'New', year: 1, themeId: 'slate' } : { id: generateId(), source: data.sankeyNodes[0]?.id, target: data.sankeyNodes[0]?.id, volume: 10 }])} className="p-3 text-xs font-bold text-blue-600"><Icon name="Plus" className="w-3 h-3 inline mr-1" />Add {cfg.t.slice(0,-1)}</button>
                </div>
              ))}
            </div>}
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BusinessStrategyDashboard />);
  </script>
</body>
</html>
